services:
  postgres:
    image: postgres:15
    container_name: teknofest-database
    environment:
      POSTGRES_DB: teknofest
      POSTGRES_USER: teknofest
      POSTGRES_PASSWORD: teknofest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: teknofest-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  pgdata:
  redis_data:
